# Recreate wolf's /run bind-mount source directories on boot.
#
# Wolf LXC containers bind-mount /run/wolf from the Proxmox host into the
# container rootfs. /run is tmpfs, so after every host reboot the directory
# is gone and LXC fails to start the container with:
#
#   safe_mount: No such file or directory - Failed to mount "/run/wolf"
#
# systemd-tmpfiles runs before pve-guests.service, so the directory is in
# place by the time Proxmox tries to start the containers.

d /run/wolf 0755 root root -
